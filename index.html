<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Secret Challenge</title>
<!-- Firebase SDK (compat - no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --b2:#0e1933;--b3:#162448;--b4:#1e3060;--b5:#2a4480;--b6:#3a5ca8;--b7:#5278cc;--b8:#7aa0e8;--b9:#b0c8f8;--b10:#e0ecff;
  --gold:#e8c04a;--gold-d:#c09020;
  --green:#2ecc71;--green-d:#1a9e50;
  --red:#e74c3c;--red-l:#fff0ee;
  --purple:#8b5cf6;
  --muted:#6080a8;--muted-l:#c8d8f0;
  --surface:#f0f5ff;--ink:#0a1428;
  --sh:0 2px 20px rgba(10,20,60,.08);
}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);height:100vh;height:100dvh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;background:var(--surface)}
/* iOS Safe Area */
.auth-wrap{padding-top:max(20px, env(safe-area-inset-top));padding-bottom:max(20px, env(safe-area-inset-bottom))}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.2}
.page{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;padding:14px 14px 20px}
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,#070d1f,#0e1933,#070d1f)}
.auth-card{background:rgba(240,245,255,.97);border-radius:28px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 32px 80px rgba(0,0,0,.55)}
.auth-logo{text-align:center;margin-bottom:26px}
.auth-logo h1{font-size:1.8rem;color:var(--b3)}
.auth-logo p{color:var(--muted);font-size:.82rem;margin-top:5px;font-style:italic}
.auth-gem{font-size:2rem;display:block;margin-bottom:8px}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.ubtn{padding:15px 10px;border:2px solid transparent;border-radius:14px;cursor:pointer;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;background:#eef2fc;color:var(--b3);transition:all .2s}
.ubtn.on,.ubtn:hover{border-color:var(--b6);background:rgba(58,92,168,.09);color:var(--b4)}
.field{margin-bottom:13px}
.lbl{display:block;font-size:.72rem;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.07em}
input,select,textarea{width:100%;padding:12px 14px;border:1.5px solid #d0daf0;border-radius:11px;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;background:white;color:var(--ink);transition:border .2s}
input:focus,select:focus,textarea:focus{border-color:var(--b6)}
textarea{resize:vertical;min-height:70px}
.btn{padding:12px 18px;border:none;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:all .18s}
.btn-full{width:100%}
.btn-p{background:linear-gradient(135deg,var(--b6),var(--b4));color:white}
.btn-s{background:linear-gradient(135deg,var(--green),var(--green-d));color:white}
.btn-d{background:var(--red);color:white}
.btn-o{background:transparent;border:1.5px solid var(--muted-l);color:var(--muted)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:white}
.btn-sm{padding:8px 14px;font-size:.8rem;border-radius:9px}
.err{color:var(--red);font-size:.8rem;margin-top:5px}
.note-box{background:#eef4ff;border:1px solid #c0d4f8;border-radius:10px;padding:11px 14px;font-size:.8rem;color:var(--b4);margin-bottom:14px}
.topbar{display:flex;align-items:center;padding:12px 16px;padding-top:max(12px, env(safe-area-inset-top));background:white;border-bottom:1px solid #e0eaf8;gap:10px;flex-shrink:0}
.topbar-name{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--b3);flex:1}
.pts-badge{display:flex;align-items:center;gap:5px;background:var(--b10);border:1px solid var(--b9);border-radius:20px;padding:5px 12px;font-size:.82rem;font-weight:700;color:var(--b4)}
.icon-btn{background:none;border:none;cursor:pointer;padding:5px;color:var(--muted);line-height:0;border-radius:8px}
.bnav{display:grid;grid-template-columns:repeat(4,1fr);background:white;border-top:1px solid #e0eaf8;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.ni{display:flex;flex-direction:column;align-items:center;padding:9px 4px 8px;gap:3px;border:none;background:none;cursor:pointer;font-size:.6rem;font-weight:600;color:var(--muted);letter-spacing:.04em;font-family:'DM Sans',sans-serif;position:relative}
.b-ben-item{display:flex;gap:12px;margin-bottom:15px;align-items:flex-start}
.b-ben-item:last-child{margin-bottom:0}
.b-icon{font-size:1.5rem;background:#162448;width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.b-text{font-size:.8rem;color:#c8d8f8;line-height:1.4}
.b-text strong{color:#8badaa;font-size:.85rem}
.ni.on{color:var(--b5)}
.ni svg{width:20px;height:20px}
.ni-dot{position:absolute;top:6px;right:50%;margin-right:-14px;width:7px;height:7px;border-radius:50%;background:var(--red)}
.balance-hero{background:linear-gradient(135deg,var(--b3),var(--b5),var(--b2));border-radius:22px;padding:22px 20px;color:white;position:relative;overflow:hidden;flex-shrink:0}
.bal-label{font-size:.7rem;opacity:.7;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:4px}
.bal-amount{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;line-height:1}
.bal-sub{font-size:.75rem;opacity:.65;margin-top:6px}
.bal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.bal-stat{background:rgba(255,255,255,.1);border-radius:12px;padding:10px 12px}
.bal-stat.danger{background:rgba(231,76,60,.3)}
.bal-stat-val{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700}
.bal-stat-lbl{font-size:.62rem;opacity:.7;margin-top:1px;text-transform:uppercase;letter-spacing:.05em}
.card{background:white;border-radius:16px;padding:16px;box-shadow:var(--sh);border:1px solid #e8f0fc}
.card-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--b3);margin-bottom:12px}
.sec-label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.acc-row{border-bottom:1px solid #f0f5ff}
.acc-row:last-child{border-bottom:none}
.acc-header{display:flex;justify-content:space-between;align-items:center;padding:11px 0;cursor:pointer;user-select:none;gap:8px}
.acc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.acc-val{font-weight:700;font-size:.82rem;white-space:nowrap}
.acc-arrow{color:var(--muted);font-size:.85rem;transition:transform .2s;display:inline-block}
.acc-body{display:none;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:.8rem;line-height:1.55}
.acc-body.blue{background:var(--b10);color:var(--b4)}
.acc-body.red{background:#fff0ee;color:#8b2020}
.acc-row.open .acc-arrow{transform:rotate(180deg)}
.acc-row.open .acc-body{display:block}
.quiz-card{background:white;border-radius:18px;padding:20px;box-shadow:var(--sh);border:1px solid #e0eaf8}
.quiz-prog{display:flex;gap:4px;margin-bottom:18px}
.quiz-dot{flex:1;height:4px;border-radius:2px;background:#e0eaf8;transition:background .3s}
.quiz-dot.active{background:var(--b6)}
.quiz-dot.ok{background:var(--green)}
.quiz-dot.ko{background:var(--red)}
.quiz-q{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--b2);line-height:1.45;margin-bottom:18px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{padding:13px 16px;border:1.5px solid #e0eaf8;border-radius:12px;cursor:pointer;font-size:.88rem;font-weight:500;text-align:left;background:white;color:var(--ink);font-family:'DM Sans',sans-serif;width:100%;transition:all .18s}
.quiz-opt:hover:not([disabled]){border-color:var(--b7);background:var(--b10)}
.quiz-opt.opt-ok{border-color:var(--green);background:#edfbf3;color:var(--green-d);font-weight:600}
.quiz-opt.opt-ko{border-color:var(--red);background:var(--red-l);color:var(--red);font-weight:600}
.quiz-opt.opt-reveal{border-color:var(--green);background:#edfbf3;color:var(--green-d)}
.score-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-weight:700;font-size:.9rem}
.pill-pos{background:#edfbf3;color:var(--green-d)}
.pill-neg{background:var(--red-l);color:var(--red)}
.pill-neu{background:var(--b10);color:var(--b4)}
.rw-item{background:white;border-radius:14px;padding:15px;box-shadow:var(--sh);border:1px solid #e8f0fc;display:flex;align-items:flex-start;gap:12px}
.rw-icon{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--b6),var(--b4));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.rw-info{flex:1;min-width:0}
.rw-name{font-family:'Playfair Display',serif;font-weight:700;font-size:.9rem;margin-bottom:3px}
.rw-desc{font-size:.77rem;color:var(--muted);line-height:1.4;margin-bottom:8px}
.rw-cost{display:inline-flex;align-items:center;gap:4px;font-size:.78rem;font-weight:700;color:var(--b4);background:var(--b10);padding:3px 9px;border-radius:10px}
.ar-card{border-radius:14px;padding:15px;box-shadow:var(--sh)}
.ar-card.gold{background:linear-gradient(135deg,#fff9ea,#fef3cc);border:1px solid #f0dfa0}
.ar-card.purple{background:linear-gradient(135deg,#f8f0ff,#ede9fe);border:1.5px solid #d4c0f8}
.ar-card.grey{background:#f8faff;border:1px solid #e0eaf8;opacity:.75}
.ar-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.ar-title{font-family:'Playfair Display',serif;font-weight:700;font-size:.9rem}
.ar-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:.72rem;font-weight:700;white-space:nowrap}
.badge-wait{background:#fff3cd;color:#856404}
.badge-ok{background:#d4edda;color:#1a6a30}
.badge-conf{background:#ede9fe;color:#5b21b6}
.badge-exp{background:#f8d7da;color:#721c24}
.countdown{font-size:.8rem;font-weight:600;margin-top:4px}
.confirm-box{background:#ede9fe;border-radius:10px;padding:10px 12px;margin-top:10px}
.confirm-box p{font-size:.79rem;color:#5b21b6;font-weight:600;margin-bottom:10px}
.mandatory-alert{background:linear-gradient(135deg,#fff0ee,#fde8e6);border:1.5px solid #f5c0bc;border-radius:14px;padding:14px 16px}
.mandatory-alert h4{font-family:'Playfair Display',serif;color:var(--red);font-size:.9rem;margin-bottom:4px}
.mandatory-alert p{font-size:.78rem;color:#8b2020;line-height:1.45}

/* ── FLASH QUESTION ── */
.fq-wrap{background:linear-gradient(135deg,#0e1933,#1e3060);border-radius:22px;padding:22px 20px;color:white;position:relative;overflow:hidden}
.fq-wrap::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:rgba(255,255,255,.05);border-radius:50%}
.fq-label{font-size:.68rem;opacity:.7;text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:8px}
.fq-timer{position:absolute;top:18px;right:18px;background:rgba(255,255,255,.12);border-radius:20px;padding:4px 10px;font-size:.72rem;font-weight:700}
.fq-timer.urgent{background:rgba(231,76,60,.4)}
.fq-question{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;line-height:1.45;margin-bottom:16px;position:relative}
.fq-opts{display:flex;flex-direction:column;gap:7px}
.fq-opt{padding:11px 14px;border:1.5px solid rgba(255,255,255,.15);border-radius:11px;cursor:pointer;font-size:.85rem;font-weight:500;text-align:left;background:rgba(255,255,255,.06);color:white;font-family:'DM Sans',sans-serif;width:100%;transition:all .18s}
.fq-opt:hover:not([disabled]){background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.35)}
.fq-opt.fq-ok{background:rgba(46,204,113,.25);border-color:var(--green);font-weight:600}
.fq-opt.fq-ko{background:rgba(231,76,60,.25);border-color:var(--red);font-weight:600}
.fq-opt.fq-reveal{background:rgba(46,204,113,.15);border-color:var(--green)}
.fq-result-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-weight:700;font-size:.85rem;margin-top:10px}
.fq-pos{background:rgba(46,204,113,.25);color:#7effc0}
.fq-neg{background:rgba(231,76,60,.25);color:#ffaaaa}

/* Reward nudge inside flash result */
.reward-nudge{background:linear-gradient(135deg,#1a1040,#2a1860);border:1.5px solid rgba(139,92,246,.4);border-radius:14px;padding:16px;margin-top:14px;text-align:center}
.reward-nudge h4{font-family:'Playfair Display',serif;font-size:.95rem;color:#c4b5fd;margin-bottom:6px}
.reward-nudge p{font-size:.78rem;color:rgba(196,181,253,.75);margin-bottom:12px;line-height:1.45}
.reward-nudge-btns{display:flex;gap:8px;justify-content:center}

/* ── MINI-GAMES ── */
.mg-wrap{background:linear-gradient(135deg,#0e1933,#1e3060);border-radius:22px;padding:22px 20px;color:white;position:relative;overflow:hidden}
.mg-wrap::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:rgba(255,255,255,.05);border-radius:50%}
.mg-label{font-size:.68rem;opacity:.7;text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:8px}
.mg-title{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:16px;position:relative}
.mg-result{text-align:center;margin-top:16px}
.mg-result-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-weight:700;font-size:.9rem}
.mg-pos{background:rgba(46,204,113,.25);color:#7effc0}
.mg-zero{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}

/* Wheel */
.wheel-container{position:relative;width:240px;height:240px;margin:0 auto 16px}
.wheel-svg{width:100%;height:100%;transition:transform 3s cubic-bezier(.17,.67,.12,.99)}
.wheel-pointer{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:1.6rem;z-index:2;filter:drop-shadow(0 2px 4px rgba(0,0,0,.4))}
.wheel-spin-btn{display:block;margin:0 auto;padding:12px 32px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-d));color:white;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(232,192,74,.4)}

/* Scratch Card */
.scratch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto 16px}
.scratch-cell{width:100%;aspect-ratio:1;border-radius:12px;border:none;cursor:pointer;font-size:1.5rem;font-family:'DM Sans',sans-serif;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .3s}
.scratch-cell.covered{background:linear-gradient(135deg,#3a5ca8,#5278cc);color:transparent;box-shadow:inset 0 2px 8px rgba(0,0,0,.2)}
.scratch-cell.covered::after{content:'?';color:rgba(255,255,255,.5);font-size:1.3rem}
.scratch-cell.revealed{background:rgba(255,255,255,.1);cursor:default}

/* Slot Machine */
.slot-container{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.slot-reel{width:64px;height:72px;background:rgba(0,0,0,.3);border-radius:14px;border:2px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:2.2rem;overflow:hidden}
.slot-reel.spinning{animation:slotSpin .15s linear infinite}
@keyframes slotSpin{0%{transform:translateY(-4px)}50%{transform:translateY(4px)}100%{transform:translateY(-4px)}}
.slot-spin-btn{display:block;margin:0 auto;padding:12px 32px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--purple),#6d28d9);color:white;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(139,92,246,.4)}

/* Lucky Dice */
.dice-container{display:flex;justify-content:center;gap:16px;margin-bottom:16px}
.dice{width:64px;height:64px;background:white;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:var(--b2);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.dice.rolling{animation:diceRoll .12s linear infinite}
@keyframes diceRoll{0%{transform:rotate(0deg) scale(1)}25%{transform:rotate(90deg) scale(.9)}50%{transform:rotate(180deg) scale(1)}75%{transform:rotate(270deg) scale(.9)}100%{transform:rotate(360deg) scale(1)}}
.dice-roll-btn{display:block;margin:0 auto;padding:12px 32px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--green-d));color:white;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(46,204,113,.4)}
.overlay{position:fixed;inset:0;background:rgba(5,10,30,.7);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.overlay.center{align-items:center}
.sheet{background:white;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.32,1,.36,1)}
.sheet.rounded{border-radius:24px;text-align:center;padding:32px 24px 28px}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:40px;height:4px;background:#e0eaf8;border-radius:2px;margin:0 auto 20px}
.sheet h2{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--b2);margin-bottom:6px}
.sheet-sub{font-size:.83rem;color:var(--muted);margin-bottom:18px;line-height:1.5}
.sheet-actions{display:flex;gap:8px;margin-top:16px}
.mode-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.mode-tab{padding:9px;border:1.5px solid #e0eaf8;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;background:white;color:var(--muted);text-align:center;transition:all .18s}
.mode-tab.on{border-color:var(--b6);background:var(--b10);color:var(--b4)}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:var(--b2);color:white;padding:10px 20px;border-radius:12px;font-size:.82rem;font-weight:500;z-index:300;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.35);white-space:nowrap}
.empty{text-align:center;padding:30px 16px;color:var(--muted)}
.empty-ico{font-size:2.2rem;display:block;margin-bottom:10px}
.empty p{font-size:.83rem;line-height:1.5}
.ob-dots{display:flex;justify-content:center;gap:6px;margin:20px 0}
.ob-dot{height:7px;border-radius:4px;background:var(--b9);transition:all .3s}
.ob-dot.on{background:var(--b5);width:20px}
.ob-dot.off{width:7px}
.adm-wrap{height:100vh;overflow-y:auto;background:#070d1f;color:#c8d8f8;font-family:'DM Sans',sans-serif}
.adm-top{background:#0e1933;padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #162448;position:sticky;top:0;z-index:10}
.adm-top h1{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--b9)}
.adm-body{padding:18px 18px 40px;max-width:860px;margin:0 auto}
.adm-tabs{display:flex;gap:3px;margin-bottom:20px;background:#0e1933;padding:5px;border-radius:11px;border:1px solid #162448}
.adm-tab{flex:1;padding:9px 6px;border:none;background:none;color:#5a7090;border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;transition:all .18s}
.adm-tab.on{background:var(--b5);color:white}
.acard{background:#0e1933;border-radius:13px;padding:18px;margin-bottom:12px;border:1px solid #162448}
.acard h3{font-family:'Playfair Display',serif;color:var(--b8);margin-bottom:14px;font-size:.9rem}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.af{display:flex;flex-direction:column;gap:5px}

(function(){
'use strict';

/* ── GLOBAL EVENT DELEGATION ── */
document.addEventListener('click', function(e) {
  var el = e.target;
  // Walk up to find a [data-action] element
  while (el && el !== document) {
    var action = el.getAttribute('data-action');
    if (action) { handleAction(action, el, e); return; }
    el = el.parentElement;
  }
});

function handleAction(action, el, e) {
  var arg = el.getAttribute('data-arg') || '';
  var arg2 = el.getAttribute('data-arg2') || '';
  switch(action) {
    case 'pick-user':      selU = arg; render(); break;
    case 'go-admin':       session = 'admin'; render(); break;
    case 'do-login':       doLogin(); break;
    case 'do-adm-login':   doAdmLogin(); break;
    case 'logout':         if(session && session!=='admin') db.ref('sc_presence/'+session).remove(); clearSession(); session = null; quizSess = null; render(); break;
    case 'adm-logout':     session = null; adminAuthed = false; sessionStorage.removeItem('adm_ok'); render(); break;
    case 'set-tab':        tab = arg; render(); break;
    case 'set-adm-tab':    adminTab = arg; render(); break;
    case 'toggle-history':  showHistory = !showHistory; render(); break;

    case 'open-claim':     openClaim(arg); break;
    case 'set-mode':       claimMode = arg; render(); break;
    case 'close-overlay':  if (e.target === el) { overlay = null; render(); } break;
    case 'cancel-overlay': overlay = null; render(); break;
    case 'submit-claim':   submitClaim(); break;
    case 'mark-done':      markDone(arg); break;
    case 'confirm-done':   confirmDone(arg, arg2 === 'yes'); break;
    case 'declare-unfulfilled': declareUnfulfilled(arg); break;
    case 'report-late':    reportLate(arg); break;
    case 'view-order':     overlay = {type:'order_detail', id:arg, isExec: arg2 === '1'}; render(); break;
    case 'open-activity':  overlay = {type:'activity'}; render(); break;
    case 'fq-claim':       overlay = null; tab = 'shop'; render(); break;
    case 'fq-skip-claim':  overlay = null; render(); break;
    case 'toggle-acc':     toggleAcc(+arg, el); break;
    case 'ob-next':        obStep++; render(); break;
    case 'ob-back':        obStep--; render(); break;
    case 'ob-close':       showOB = false; render(); break;
    case 'add-q':          addQ(); break;
    case 'del-q':          delQ(arg); break;
    case 'add-r':          addR(); break;
    case 'del-r':          delR(arg); break;
    case 'adj-pts':        adjPts(arg, +arg2); break;
    case 'do-reset':       doReset(); break;
    case 'copy-topic':     copyToClipboard(arg); break;
    case 'fq-answer':      answerFlashQ(+arg); break;
    case 'fq-dismiss':     dismissFlashQ(); break;
    case 'fq-claim':       flashQ=null; miniGame=null; tab='shop'; render(); break;
    case 'fq-skip-claim':  flashQ=null; miniGame=null; render(); break;
    case 'mg-dismiss':     dismissMiniGame(); break;
    case 'mg-wheel-spin':  doWheelSpin(); break;
    case 'mg-scratch':     doScratchReveal(+arg); break;
    case 'mg-scratch-finish': doScratchFinish(arg === '1'); break;
    case 'mg-slots-spin':  doSlotsSpin(); break;
    case 'mg-dice-roll':   doDiceRoll(); break;
  }
}

/* ── MINI-GAME INTERACTIONS ── */
function doWheelSpin() {
  if (!miniGame || miniGame.played || miniGame.gameState.spinning) return;
  var gs = miniGame.gameState;
  gs.spinning = true;
  var segments = [10,50,0,100,25,250,75,150];
  var prize = calcWeightedPrize(250);
  // Find closest segment
  var segAngle = 360 / segments.length;
  var closestIdx = 0, closestDiff = 999;
  segments.forEach(function(v, i) {
    if (Math.abs(v - prize) < closestDiff) { closestDiff = Math.abs(v - prize); closestIdx = i; }
  });
  prize = segments[closestIdx]; // snap to actual segment value
  // Calculate target angle: spin several full rotations + land on segment
  var targetSegAngle = 360 - (closestIdx * segAngle + segAngle / 2);
  var totalAngle = 360 * (5 + Math.floor(Math.random() * 3)) + targetSegAngle;
  gs.angle = totalAngle;
  render();
  setTimeout(function() {
    gs.spinning = false;
    finishMiniGame(prize);
  }, 3200);
}

function doScratchReveal(idx) {
  if (!miniGame || miniGame.played) return;
  var gs = miniGame.gameState;
  if (gs.done || gs.cells[idx].revealed) return;
  gs.cells[idx].revealed = true;
  gs.reveals++;
  if (gs.reveals >= gs.maxReveals) gs.done = true;
  // Check for early win: 3 matching revealed symbols
  var counts = {};
  gs.cells.forEach(function(c) { if (c.revealed) { counts[c.symbol] = (counts[c.symbol]||0)+1; } });
  var earlyWin = false;
  Object.keys(counts).forEach(function(k) { if (counts[k] >= 3) earlyWin = true; });
  if (earlyWin) gs.done = true;
  render();
}

function doScratchFinish(won) {
  if (!miniGame || miniGame.played) return;
  var prize = won ? calcWeightedPrize(250) : 0;
  if (won && prize === 0) prize = 20; // minimum win if matched
  // Reveal all
  miniGame.gameState.cells.forEach(function(c) { c.revealed = true; });
  finishMiniGame(prize);
}

function doSlotsSpin() {
  if (!miniGame || miniGame.played || miniGame.gameState.spinning) return;
  var gs = miniGame.gameState;
  gs.spinning = true;
  render();
  // Animate reel changes
  var ticks = 0, maxTicks = 20;
  var interval = setInterval(function() {
    ticks++;
    for (var i = 0; i < 3; i++) {
      if (ticks < maxTicks - i * 3) {
        gs.reels[i] = gs.emojis[Math.floor(Math.random() * gs.emojis.length)];
      }
    }
    // Update reels display directly for animation
    for (var j = 0; j < 3; j++) {
      var rel = document.getElementById('reel-' + j);
      if (rel) rel.textContent = gs.reels[j];
    }
    if (ticks >= maxTicks) {
      clearInterval(interval);
      gs.spinning = false;
      // Determine prize based on matches
      var prize = 0;
      if (gs.reels[0] === gs.reels[1] && gs.reels[1] === gs.reels[2]) {
        prize = 250; // jackpot
      } else if (gs.reels[0] === gs.reels[1] || gs.reels[1] === gs.reels[2] || gs.reels[0] === gs.reels[2]) {
        prize = calcWeightedPrize(120);
        if (prize === 0) prize = 30;
      }
      // 40% chance of random small win even with no matches
      if (prize === 0 && Math.random() < 0.4) {
        prize = Math.floor(Math.random() * 40) + 10;
      }
      finishMiniGame(prize);
    }
  }, 100);
}

function doDiceRoll() {
  if (!miniGame || miniGame.played || miniGame.gameState.rolling) return;
  var gs = miniGame.gameState;
  gs.rolling = true;
  render();
  var ticks = 0;
  var interval = setInterval(function() {
    ticks++;
    gs.d1 = Math.floor(Math.random() * 6) + 1;
    gs.d2 = Math.floor(Math.random() * 6) + 1;
    // Update dice display directly
    var diceEmojis = ['','⚀','⚁','⚂','⚃','⚄','⚅'];
    var diceEls = document.querySelectorAll('.dice');
    if (diceEls[0]) diceEls[0].textContent = diceEmojis[gs.d1];
    if (diceEls[1]) diceEls[1].textContent = diceEmojis[gs.d2];
    if (ticks >= 15) {
      clearInterval(interval);
      gs.rolling = false;
      var sum = gs.d1 + gs.d2;
      var prize = sum * 20; // 2-12 × 20 = 40-240 pt
      finishMiniGame(prize);
    }
  }, 100);
}

/* Select 10 questions balanced by difficulty.
   Strategy: divide bank into LOW (1-3), MED (4-6), HIGH (7-10),
   pick ~4 LOW + 4 MED + 2 HIGH (adjusting if a bucket is small),
   then shuffle the final 10. */
function selectDailyQuestions() {
  var low  = QUESTION_BANK.filter(function(q){ return q.diff <= 3; });
  var med  = QUESTION_BANK.filter(function(q){ return q.diff >= 4 && q.diff <= 6; });
  var high = QUESTION_BANK.filter(function(q){ return q.diff >= 7; });

  function pick(arr, n) {
    var shuffled = arr.slice().sort(function(){ return Math.random() - 0.5; });
    return shuffled.slice(0, Math.min(n, shuffled.length));
  }

  // Targets: 4 low, 4 med, 2 high — fill gaps from other buckets
  var targets = [4, 4, 2];
  var buckets = [low, med, high];
  var chosen = [];
  var remaining = 10;

  for (var i = 0; i < 3; i++) {
    var got = pick(buckets[i], targets[i]);
    chosen = chosen.concat(got);
    remaining -= got.length;
  }

  // If we still need more (e.g. high bucket small), fill from any remaining
  if (remaining > 0) {
    var usedIds = {};
    chosen.forEach(function(q){ usedIds[q.id] = true; });
    var leftover = QUESTION_BANK.filter(function(q){ return !usedIds[q.id]; });
    leftover.sort(function(){ return Math.random() - 0.5; });
    chosen = chosen.concat(leftover.slice(0, remaining));
  }

  // Final shuffle
  chosen.sort(function(){ return Math.random() - 0.5; });
  return chosen.slice(0, 10);
}

function arrToObj(arr) {
  if (!arr || !arr.length) return {};

}

function initGameState(type) {
  if (type === 'wheel') return {angle: 0, spinning: false};
  if (type === 'scratch') {
    var symbols = ['💎','🌟','🍀','🔥','👑','💰'];
    var winSym = symbols[Math.floor(Math.random() * symbols.length)];
    var cells = [];
    // Place 3 winning symbols
    var winPositions = shuffle9()[0];
    for (var i = 0; i < 9; i++) cells.push({symbol: symbols[Math.floor(Math.random() * symbols.length)], revealed: false});
    // Decide win (30% chance)
    if (Math.random() < 0.3) {
      var positions = shuffle9().slice(0, 3);
      positions.forEach(function(p) { cells[p].symbol = winSym; });
    }
    return {cells: cells, reveals: 0, maxReveals: 5, done: false};
  }
  if (type === 'slots') {
    var emojis = ['🍒','🍋','🔔','💎','⭐','🍀'];
    return {reels: [emojis[0], emojis[1], emojis[2]], spinning: false, emojis: emojis};
  }
  if (type === 'dice') return {d1: 1, d2: 1, rolling: false};
  return {};
}

function shuffle9() {
  var a = [0,1,2,3,4,5,6,7,8];
  for (var i = a.length - 1; i > 0; i--) { var j = Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
  return a;
}

function calcWeightedPrize(max) {
  // Weighted: most prizes are low, few are high
  var r = Math.random();
  if (r < 0.15) return 0;         // 15% chance of 0
  if (r < 0.45) return Math.floor(Math.random() * 30) + 10;   // 30% → 10-40
  if (r < 0.70) return Math.floor(Math.random() * 50) + 40;   // 25% → 40-90
  if (r < 0.88) return Math.floor(Math.random() * 60) + 90;   // 18% → 90-150
  if (r < 0.97) return Math.floor(Math.random() * 50) + 150;  // 9% → 150-200
  return Math.floor(Math.random() * 50) + 200;                // 3% → 200-250
}

/* WHEEL */
function renderWheelGame() {
  var gs = miniGame.gameState;
  var segments = [
    {label:'10',  color:'#e74c3c', val:10},
    {label:'50',  color:'#3498db', val:50},
    {label:'0',   color:'#95a5a6', val:0},
    {label:'100', color:'#2ecc71', val:100},
    {label:'25',  color:'#e67e22', val:25},
    {label:'250', color:'#f1c40f', val:250},
    {label:'75',  color:'#9b59b6', val:75},
    {label:'150', color:'#1abc9c', val:150}
  ];
  var n = segments.length, anglePerSeg = 360 / n;
  var h = '<div class="wheel-container">';
  h += '<div class="wheel-pointer">▼</div>';
  h += '<svg class="wheel-svg" id="wheel-svg" viewBox="0 0 200 200" style="transform:rotate(' + (gs.angle || 0) + 'deg)">';
  for (var i = 0; i < n; i++) {
    var startA = i * anglePerSeg - 90;
    var endA = startA + anglePerSeg;
    var sr = startA * Math.PI / 180, er = endA * Math.PI / 180;
    var x1 = 100 + 95 * Math.cos(sr), y1 = 100 + 95 * Math.sin(sr);
    var x2 = 100 + 95 * Math.cos(er), y2 = 100 + 95 * Math.sin(er);
    var large = anglePerSeg > 180 ? 1 : 0;
    h += '<path d="M100,100 L'+x1+','+y1+' A95,95 0 '+large+',1 '+x2+','+y2+' Z" fill="'+segments[i].color+'"/>';
    var midA = (startA + anglePerSeg/2) * Math.PI / 180;
    var tx = 100 + 60 * Math.cos(midA), ty = 100 + 60 * Math.sin(midA);
    h += '<text x="'+tx+'" y="'+ty+'" text-anchor="middle" dominant-baseline="central" fill="white" font-size="12" font-weight="700" font-family="sans-serif">'+segments[i].label+'</text>';
  }
  h += '</svg></div>';
  if (!gs.spinning) {
    h += '<button class="wheel-spin-btn" data-action="mg-wheel-spin">Gira! 🎰</button>';
  } else {
    h += '<div style="text-align:center;color:rgba(255,255,255,.6);font-size:.82rem">La ruota sta girando...</div>';
  }
  return h;
}

function checkPenaltyWarning() {
  if (!session || session === 'admin') return;
  var u = S.users[session];
  if (!u) return;

  // ── Premio inactivity warning (2 days) ──
  if (u.lastRewardClaim) {
    var days = daysAgo(u.lastRewardClaim);
    var warnKey = 'pw_warned_' + todayKey();
    if (days >= 2 && days < 3 && !sessionStorage.getItem(warnKey)) {
      sessionStorage.setItem(warnKey, '1');
      var topic = u.ntfyTopic;
      if (topic) {
        ntfySend(topic, '⚠️ Penalità in arrivo!', 'Sono ' + days + ' giorni senza effettuare nuovi ordini. Entro domani perdi 500 pt!', ['warning']);
      }
    }

}
function pname(u) { return u === 'giulia' ? 'Giulia' : 'Stefano'; }
function partner() { return session === 'giulia' ? 'stefano' : 'giulia'; }
function myPts() { return S.users[session] ? (S.users[session].pts || 0) : 0; }
function ptOf(u) { return S.users[u] ? (S.users[u].pts || 0) : 0; }
function countdown(dl) {
  var diff = new Date(dl) - Date.now();
  if (diff <= 0) return 'Scaduto';
  var h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000);
  if (h >= 24) { var d = Math.floor(h/24); return d+'g '+(h%24)+'h'; }
  return h > 0 ? h+'h '+m+'m' : m+' min';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function(){ showToast('✅ Copiato!'); }).catch(function(){ showToast('Copia: ' + text, 5000); });
  } else {
    showToast('Topic: ' + text, 6000);
  }
}
function showToast(msg, dur) {
  if (toastT) clearTimeout(toastT);
  toast = msg; render();

}

/* ── TICK ── */
function checkTick() {
  if (!session || session === 'admin') return;
  var u = S.users[session], today = todayKey(), changed = false;

  // ── Premio inactivity penalty (3 days) ──
  if (u.penaltyChecked !== today && u.lastRewardClaim) {
    if (daysAgo(u.lastRewardClaim) >= 3) {
      S.users[session].pts = Math.max(0, (u.pts||0) - 500);
      S.users[session].penaltyChecked = today;
      S.users[session].lastRewardClaim = new Date().toISOString();
      changed = true;
      showToast('Penalità: -500 pt per inattività premi!', 5000);
    }
  }


  // ── Expire overdue reward requests ──
  S.requests.forEach(function(rr, i) {
    if (rr.status === 'pending' && rr.mode === 'deadline' && rr.deadline && new Date(rr.deadline) < new Date()) {
      S.requests[i].status = 'expired'; changed = true;
    }
  });

  if (changed) save(S);
}

function openClaim(rid) {

function submitClaim() {
  if (!overlay || !overlay.reward) return;
  var r = overlay.reward;
  var claimDLEl = document.getElementById('claimDL');
  var dlMode = claimDLEl ? claimDLEl.value : '';
  if (!dlMode) {
    showToast('Devi selezionare un\'ora di consegna!');
    return;
  }
  
  var extraCost = 0;
  var premiumText = [];
  if (dlMode === 'subito') {
    extraCost += 100;
    premiumText.push("Ordine Prioritario (Subito)");
  } else if (dlMode === '1') {
    extraCost += 50;
    premiumText.push("Ordine Prioritario (Entro 1h)");
  } else if (dlMode !== '0') {
    premiumText.push("Consegna entro "+dlMode+"h");
  }
  
  var cbx = document.querySelectorAll('#premiumOptions input[type="checkbox"]:checked');
  for (var i=0; i<cbx.length; i++) {
    extraCost += parseInt(cbx[i].value, 10);
    var optText = cbx[i].getAttribute('data-opt');
    if (cbx[i].id === 'cbBenda') {
      var rBenda = document.querySelector('input[name="optBenda"]:checked');
      if (rBenda) optText += " (" + rBenda.value + ")";
    } else if (cbx[i].id === 'cbManette') {
      var rManette = document.querySelector('input[name="optManette"]:checked');
      if (rManette) optText += " (" + rManette.value + ")";
    } else if (cbx[i].id === 'cbVieni') {
      var txtVieni = document.getElementById('txtVieni');
      if (txtVieni && txtVieni.value.trim() !== '') optText += " (" + txtVieni.value.trim() + ")";
    }
    premiumText.push(optText);
  }
  
  var totalCost = r.cost + extraCost;
  var pts = myPts();
  if (pts < totalCost) { showToast('Punti insufficienti! Te ne servono ' + totalCost); return; }
  
  if (!confirm('Dettaglio Ordine:\nProdotto: '+r.name+'\nCosto Finale: '+totalCost+' pt\n\nConfermi l\'acquisto di questo ordine?')) {
    return;
  }
  
  var actualDl = '';
  if (dlMode !== '0') {
    var d = new Date();
    if (dlMode === 'subito') d.setMinutes(d.getMinutes() + 30);
    else d.setHours(d.getHours() + parseInt(dlMode, 10));
    actualDl = d.toISOString();
  }
  
  S.users[session].pts = pts - totalCost;
  S.users[session].lastRewardClaim = new Date().toISOString();
  S.requests.push({
    id: Date.now()+'', by: session,
    name: r.name, emoji: r.emoji || '🎁',
    requestedAt: new Date().toISOString(),
    mode: 'deadline', deadline: actualDl, premium: premiumText, note: '', status: 'pending', cost: totalCost
  });
  save(S); overlay = null;
  notifyPartnerNewReward(r.name, actualDl);
  showToast('Ordine acquistato! Il corriere lo evaderà presto.');
}

function confirmDone(rrId, yes) {
  var i = S.requests.findIndex(function(r) { return r.id === rrId; });
  if (i < 0) return;
  var req = S.requests[i];
  if (yes) {
    req.status = 'done'; req.confirmedAt = new Date().toISOString();
    if (req.deadline && req.doneAt && new Date(req.doneAt) > new Date(req.deadline)) {
      var rCost = req.cost || 100;
      var cRefund = Math.floor(rCost * 0.3);
      var ePenalty = Math.floor(rCost * 0.5);
      var executor = req.by === 'giulia' ? 'stefano' : 'giulia';
      S.users[req.by].pts = (S.users[req.by].pts || 0) + cRefund;
      S.users[executor].pts = Math.max(0, (S.users[executor].pts || 0) - ePenalty);
      req.latePenaltyApplied = true;
      req.refundAmt = cRefund; req.penaltyAmt = ePenalty;
      showToast('Ordine completato in ritardo! Rimborsati ' + cRefund + 'pt (Penale partner: -' + ePenalty + 'pt)', 5000);
    } else {
      showToast('Ordine completato nei tempi!');
    }
  } else {
    req.status = 'pending'; delete req.doneAt;
    showToast('Rimandato — il partner dovrà ripetere!', 4000);
  }
  save(S); render();
}

  var i = S.requests.findIndex(function(r) { return r.id === rrId; });

  req.status = 'expired';
  req.unfulfilledPenaltyApplied = true;
  req.refundAmt = rCost; req.penaltyAmt = penalty; req.cancelledAt = new Date().toISOString();
  save(S);
  showToast('Ordine segnato come non evaso. Rimborsati ' + rCost + ' pt.', 4000);

function getActivityCountToday() {
  var count = 0;
  ALL_ACTIVITY_HOURS.forEach(function(h) {
    var slotKey = new Date().getFullYear()+'-'+new Date().getMonth()+'-'+new Date().getDate()+'-'+h;
    if (sessionStorage.getItem('fq_done_' + slotKey) === 'answered') count++;
  });
  return count;
}

function getLifetimeIntimacyCount() {
  return S.requests.filter(function(r) { return r.status === 'done'; }).length;
}

function getWeeklyIntimacyStats(me) {
  var stats = { me: 0, pt: 0, total: 0 };
  var now = new Date();
  S.requests.forEach(function(r) {
    if (r.status === 'done' || r.status === 'done_confirm') {
      var dStr = r.confirmedAt || r.doneAt || r.ts;
      if (dStr) {
        var diffDays = (now - new Date(dStr)) / (1000 * 60 * 60 * 24);
        if (diffDays <= 7) {
          if (r.by === me) stats.me++;
          else stats.pt++;
          stats.total++;
        }
      }
    }
  });
  return stats;
}

function getExtendedBenessereStats(me) {
  var now = new Date();
  var reqs = S.requests.filter(function(r){ return r.status === 'done' || r.status === 'done_confirm'; });
  
  var wCount=0, mCount=0, prevMCount=0;
  var myCount=0, ptCount=0;
  var items = {};
  var weeksMap = {}; 
  
  reqs.forEach(function(r) {
    var dStr = r.confirmedAt || r.doneAt || r.ts;
    if (!dStr) return;
    var d = new Date(dStr);
    var diffDays = (now - d) / (1000 * 60 * 60 * 24);
    
    if (diffDays <= 7) {
      wCount++;
      if (r.by === me) myCount++; else ptCount++;
    }
    if (diffDays <= 30) mCount++;
    else if (diffDays <= 60) prevMCount++;
    
    var wIdx = Math.floor(diffDays / 7);
    weeksMap[wIdx] = (weeksMap[wIdx] || 0) + 1;
    
    items[r.rewardName || 'Varie'] = true;
  });

  var streak = 0;
  if (!weeksMap[0] && weeksMap[1]) {
    for(var j=1; j<52; j++) {
      if(weeksMap[j]>0) streak++; else break;
    }
  } else if (weeksMap[0]) {
    for (var i=0; i<52; i++) {
      if (weeksMap[i] > 0) streak++;
      else break;
    }
  }
  
  var trend = mCount - prevMCount;
  var variety = Object.keys(items).length;
  
  return {
    w: wCount, m: mCount, prevM: prevMCount,
    my: myCount, pt: ptCount,
    streak: streak,
    trend: trend,
    variety: variety,
    total: reqs.length
  };
}

/* Pure DOM toggle — no render(), no scroll jump */
function toggleAcc(idx, triggerEl) {
  var card = triggerEl;
  while (card && !card.classList.contains('card')) card = card.parentElement;
  if (!card) return;
  var rows = card.querySelectorAll('.acc-row');
  rows.forEach(function(row, i) {
    if (i === idx) {
      row.classList.toggle('open');
    } else {
      row.classList.remove('open'); // close others
    }
  });
}

window.updateClaimTotal = function() {
  var sub = document.getElementById('sheetSub');
  if (!sub) return;
  var base = parseInt(sub.getAttribute('data-base'), 10) || 0;
  var extra = 0;
  var sel = document.getElementById('claimDL');
  if (sel && sel.value === 'subito') extra += 100;
  if (sel && sel.value === '1') extra += 50;

  var cbBenda = document.getElementById('cbBenda');
  var boxBenda = document.getElementById('boxBenda');
  if (cbBenda && boxBenda) boxBenda.style.display = cbBenda.checked ? 'block' : 'none';

  var cbManette = document.getElementById('cbManette');
  var boxManette = document.getElementById('boxManette');
  if (cbManette && boxManette) boxManette.style.display = cbManette.checked ? 'block' : 'none';

  var cbVieni = document.getElementById('cbVieni');
  var boxVieni = document.getElementById('boxVieni');
  if (cbVieni && boxVieni) boxVieni.style.display = cbVieni.checked ? 'block' : 'none';

  var cbx = document.querySelectorAll('#premiumOptions input[type="checkbox"]:checked');
  for (var i=0; i<cbx.length; i++) extra += parseInt(cbx[i].value, 10);
  document.getElementById('claimTotal').innerHTML = '🔷 ' + (base + extra) + ' pt';
};

  // Timeline
  h += '<div style="margin-bottom:16px">';
  h += '<div style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">📅 Cronologia</div>';
  var timeline = [];
  timeline.push({dot:'var(--b5)', label:'Ordine Effettuato', val: fmtDt(rr.requestedAt)});
  if (rr.doneAt) timeline.push({dot:'var(--green)', label:'Contrassegnato Consegnato', val: fmtDt(rr.doneAt), late: rr.deadline && new Date(rr.doneAt) > new Date(rr.deadline)});
  if (rr.confirmedAt) timeline.push({dot:'#1a9e50', label:'Ricezione Confermata', val: fmtDt(rr.confirmedAt)});
  if (rr.cancelledAt) timeline.push({dot:'var(--red)', label:'Annullato / Segnalato', val: fmtDt(rr.cancelledAt)});
  h += '<div style="position:relative;padding-left:18px">';
  timeline.forEach(function(t, i) {
    h += '<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:'+(i<timeline.length-1?'14px':'0')+'">';
    h += '<div style="position:absolute;left:0;width:10px;height:10px;border-radius:50%;background:'+t.dot+';margin-top:3px"></div>';
    h += '<div style="padding-left:8px"><div style="font-size:.78rem;font-weight:600;color:var(--b3)">'+t.label+(t.late?' <span style="color:var(--red);font-size:.68rem">(In Ritardo)</span>':'')+' </div><div style="font-size:.7rem;color:var(--muted)">'+t.val+'</div></div>';
    h += '</div>';
  });
  h += '</div></div>';

  // Premium options
  if (premiumList.length > 0) {
    h += '<div style="margin-bottom:16px;padding:14px;background:#fcfaff;border-radius:12px;border:1.5px dashed var(--purple)">';
    h += '<div style="font-size:.7rem;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">✨ Opzioni Premium</div>';
    h += '<ul style="margin:0 0 0 18px;padding:0;font-size:.8rem;color:#4c1d95;font-weight:600;line-height:1.5">';
    premiumList.forEach(function(p){ h += '<li>'+esc(p.trim())+'</li>'; });
    h += '</ul></div>';
  }

  // Penalty info (if applied)
  if (rr.latePenaltyApplied || rr.unfulfilledPenaltyApplied) {
    var pLabel = rr.latePenaltyApplied ? 'Penale Ritardo' : 'Penale Inadempienza';
    h += '<div style="margin-bottom:16px;padding:12px;background:#fff0ee;border-radius:12px;border:1px solid #f5c0bc">';
    h += '<div style="font-size:.7rem;font-weight:800;color:var(--red);text-transform:uppercase;margin-bottom:6px">⚠️ '+pLabel+' Applicata</div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:4px"><span style="color:var(--muted)">Rimborso Cliente</span><span style="color:var(--green);font-weight:700">+'+rr.refundAmt+' pt</span></div>';
    h += '<div style="display:flex;justify-content:space-between;font-size:.78rem"><span style="color:var(--muted)">Penale Esecutore</span><span style="color:var(--red);font-weight:700">-'+rr.penaltyAmt+' pt</span></div>';
    h += '</div>';
  }

  // Wellness impact
  h += '<div style="margin-bottom:20px;background:linear-gradient(135deg,#0e1933,#1e3060);border-radius:18px;padding:20px;color:white">';
  h += '<div style="font-size:.68rem;opacity:.7;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:8px">❤️ Impatto sul Benessere di Coppia</div>';
  h += '<div style="font-size:.82rem;opacity:.85;margin-bottom:16px;line-height:1.4">'+(isDone ? 'Questo ordine ha contribuito ai tuoi indicatori di benessere nella settimana in corso.' : 'Indicatori stimati attivi da quando hai effettuato l\'ordine.')+'</div>';

  var metrics = [
    {icon:'🛡️', label:'Scudo Immunitario (IgA)', pct: igaPct, color:'#7effc0', bar:'rgba(46,204,113,0.4)'},
    {icon:'🧠', label:'Riduzione Cortisolo', pct: cortPct, color:'#c4b5fd', bar:'rgba(139,92,246,0.4)'},
    {icon:'💞', label:'Sincronizzazione Coppia', pct: syncPct, color:'#ffb3c8', bar:'rgba(255,100,150,0.4)'},
    {icon:'💊', label:'Rilascio Ossitocina', pct: oxPct, color:'#ffd580', bar:'rgba(232,192,74,0.4)'}
  ];
  metrics.forEach(function(m) {
    h += '<div style="margin-bottom:12px">';
    h += '<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:.73rem;opacity:.85">'+m.icon+' '+m.label+'</span><span style="font-size:.73rem;font-weight:800;color:'+m.color+'">+'+m.pct+'%</span></div>';
    h += '<div style="height:5px;background:rgba(255,255,255,0.1);border-radius:3px"><div style="height:100%;width:'+m.pct+'%;background:'+m.color+';border-radius:3px;transition:width .4s"></div></div>';
    h += '</div>';
  });
  if (!isDone) {
    h += '<div style="margin-top:10px;font-size:.68rem;opacity:.5;font-style:italic">* Impatto completo registrato alla conferma ricezione.</div>';
  }
  h += '</div>';

  // Close
  h += '<button class="btn btn-o btn-full" data-action="cancel-overlay">← Chiudi Dettaglio</button>';
  h += '</div></div>';
  return h;
}

document.getElementById('R').innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#070d1f,#0e1933);flex-direction:column;gap:16px"><div style="font-size:3rem">🔷</div><div style="color:#b0c8f8;font-family:sans-serif;font-size:.9rem">Connessione in corso...</div></div>';

/* ── FIREBASE LISTENERS (after all functions defined) ── */
db.ref(DB_REF).on('value', function(snapshot) {
  var data = snapshot.val();
  if (data) {
    S = {
      users: data.users || clone(BLANK).users,
      questions: objToArr(data.questions),
      rewards: objToArr(data.rewards),
      requests: objToArr(data.requests)
    };
  }
  if (!fbReady) {
    fbReady = true;
    render(); // first load — always safe
    return;
  }
  // Ignore echoes from our own writes
  if (_writing) return;
  // Remote update from partner device — schedule a safe re-render
  scheduleRemoteRender();
});

db.ref('sc_presence').on('value', function(snap) {
  onlineUsers = {};
  var data = snap.val() || {};
  Object.keys(data).forEach(function(u) {
    if (data[u] && data[u].online) onlineUsers[u] = data[u].t;
  });
  // Update only the presence text node — no full re-render
  if (session && session !== 'admin' && fbReady) {
    var heroSub = document.querySelector('.bal-sub');
    if (heroSub) {
      var pt = session === 'giulia' ? 'stefano' : 'giulia';
      var ptPts = ptOf(pt);
      var ptOnline = onlineUsers[pt] && (Date.now() - onlineUsers[pt] < 12000);
      heroSub.textContent = pname(pt) + ': ' + ptPts + ' pt  ·  ' + (ptOnline ? '🟢 online' : '⬤ offline');
    }
  }
});

setInterval(function() {
  announcePresence();
  checkTick();
  checkPenaltyWarning();
  checkFlashQuestion();
}, 10000);
